      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #7a3efe;
        --gold: #c6a87c;
        --cream: #fdfbf7;
        --text-main: #2d2a32;
        --text-light: #6b6671;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--cream);
        color: var(--text-main);
        font-family: "Lato", sans-serif;
        font-weight: 300;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
      }
      .spinner {
        width: 40px;
        height: 40px;
        margin: 0 auto 28px;
        border: 3px solid rgba(122, 62, 254, 0.15);
        border-top-color: var(--primary);
        border-radius: 999px;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      h1 {
        margin: 0 0 12px;
        font-family: "Playfair Display", serif;
        font-weight: 500;
        font-size: 1.5rem;
      }
      p {
        margin: 0 0 24px;
        color: var(--text-light);
        line-height: 1.6;
      }
      a.manual {
        color: var(--primary);
        font-weight: 400;
        text-decoration: underline;
        text-underline-offset: 3px;
      }
    </style>
  </head>
  <body>
